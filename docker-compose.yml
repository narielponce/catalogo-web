services:
  db:
    image: postgres:15-alpine
    container_name: catalogo_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-catalogo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GHCR_USERNAME:-tu_usuario_github}/catalogo-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: catalogo_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-catalogo_db}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key}
      - N8N_SECRET=${N8N_SECRET:-your-super-secret-n8n-key}

  frontend:
    image: ghcr.io/${GHCR_USERNAME:-tu_usuario_github}/catalogo-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: catalogo_frontend
    restart: always
    depends_on:
      - backend

volumes:
  postgres_data:
